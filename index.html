<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/media/L1-01.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PRIMARY SEO -->
    <title>Monk Media | Video Production & Creative Agency Canada</title>
    <meta name="description" content="Monk Media is a Canadian creative agency offering video production, social media content, brand photography, reels and storytelling. Helping Canadian brands grow." />
    <meta name="keywords" content="Monk Media, video production Canada, social media agency Canada, brand video Canada, content creation Canada, Instagram reels Canada, creative agency Canada, brand photography Canada, why choose Monk Media, our work Monk Media" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Monk Media" />
    <link rel="canonical" href="https://hotaeshwar.github.io/MONKMEDIA/" />

    <!-- OPEN GRAPH (WhatsApp, Facebook, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Monk Media" />
    <meta property="og:title" content="Monk Media | Video Production & Creative Agency Canada" />
    <meta property="og:description" content="Canadian creative agency for video production, social media content, brand photography and storytelling." />
    <meta property="og:url" content="https://hotaeshwar.github.io/MONKMEDIA/" />
    <meta property="og:image" content="https://hotaeshwar.github.io/MONKMEDIA/media/L1-01.png" />
    <meta property="og:locale" content="en_CA" />

    <!-- TWITTER/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Monk Media | Creative Agency Canada" />
    <meta name="twitter:description" content="Canadian creative agency for video production, social media and brand content." />
    <meta name="twitter:image" content="https://hotaeshwar.github.io/MONKMEDIA/media/L1-01.png" />

    <!-- SCHEMA: tells Google your exact business type -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Monk Media",
      "url": "https://hotaeshwar.github.io/MONKMEDIA/",
      "logo": "https://hotaeshwar.github.io/MONKMEDIA/media/L1-01.png",
      "description": "Canadian creative agency for video production, social media marketing, brand photography and content creation",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CA"
      },
      "areaServed": "Canada",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Monk Media Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Video Production" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Social Media Marketing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Instagram Reels" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Brand Photography" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Content Creation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "YouTube Content" } }
        ]
      },
      "sameAs": [
        "https://instagram.com/monkmedia",
        "https://linkedin.com/company/monkmedia"
      ]
    }
    </script>

    <!-- React Router fix for GitHub Pages -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
